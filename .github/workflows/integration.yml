name: Integration

on:
  push:
    branches: [main]
    paths:
      - "scripts/**"
      - "src/**"
      - "test/**"
      - "docker-compose.yml"
      - ".github/workflows/integration.yml"
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  localstack:
    name: LocalStack (free-tier services)
    runs-on: ubuntu-latest
    services:
      localstack:
        image: localstack/localstack:latest
        ports:
          - 4566:4566
        env:
          SERVICES: s3,dynamodb,lambda,stepfunctions
          DEBUG: 0
        options: >-
          --health-cmd "curl -sf http://localhost:4566/_localstack/health"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      AWS_ENDPOINT_URL: http://localhost:4566
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1

    steps:
      - uses: actions/checkout@v4

      - name: Verify LocalStack health
        run: curl -sf http://localhost:4566/_localstack/health | python3 -m json.tool

      - name: Smoke test S3
        run: |
          aws --endpoint-url http://localhost:4566 s3 mb s3://aif-c01-test
          aws --endpoint-url http://localhost:4566 s3 ls
          echo "test content" | aws --endpoint-url http://localhost:4566 s3 cp - s3://aif-c01-test/test.txt
          aws --endpoint-url http://localhost:4566 s3 cp s3://aif-c01-test/test.txt -

      - name: Smoke test DynamoDB
        run: |
          aws --endpoint-url http://localhost:4566 dynamodb create-table \
            --table-name aif-c01-test \
            --attribute-definitions AttributeName=id,AttributeType=S \
            --key-schema AttributeName=id,KeyType=HASH \
            --billing-mode PAY_PER_REQUEST
          aws --endpoint-url http://localhost:4566 dynamodb put-item \
            --table-name aif-c01-test \
            --item '{"id":{"S":"1"},"topic":{"S":"foundation-models"}}'
          aws --endpoint-url http://localhost:4566 dynamodb get-item \
            --table-name aif-c01-test \
            --key '{"id":{"S":"1"}}'

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Python deps
        run: pip install boto3 pydantic click

      - name: Test boto3 against LocalStack
        run: |
          python3 -c "
          import boto3
          import os

          endpoint_url = os.environ['AWS_ENDPOINT_URL']
          s3 = boto3.client('s3', endpoint_url=endpoint_url)
          buckets = s3.list_buckets()
          assert any(b['Name'] == 'aif-c01-test' for b in buckets['Buckets']), 'Bucket not found'
          print(f'S3: {len(buckets[\"Buckets\"])} bucket(s)')

          dynamodb = boto3.client('dynamodb', endpoint_url=endpoint_url)
          tables = dynamodb.list_tables()
          assert 'aif-c01-test' in tables['TableNames'], 'Table not found'
          print(f'DynamoDB: {len(tables[\"TableNames\"])} table(s)')

          print('All LocalStack checks passed')
          "

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: DeLaGuardo/setup-clojure@13.4
        with:
          lein: 2.11.2

      - name: Cache Clojure deps
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-lein-${{ hashFiles('project.clj') }}
          restore-keys: ${{ runner.os }}-lein-

      - name: Test cognitect.aws against LocalStack
        env:
          LOCALSTACK_ENDPOINT: http://localhost:4566
        run: |
          lein run -m clojure.main -e '
          (do
            (require (quote [cognitect.aws.client.api :as aws]))
            (let [endpoint {:protocol :http :hostname "localhost" :port 4566}
                  s3 (aws/client {:api :s3 :endpoint-override endpoint})
                  ddb (aws/client {:api :dynamodb :endpoint-override endpoint})]
              (let [buckets (aws/invoke s3 {:op :ListBuckets})]
                (assert (some #(= "aif-c01-test" (:Name %)) (:Buckets buckets))
                        "S3 bucket not found")
                (println "S3:" (count (:Buckets buckets)) "bucket(s)"))
              (let [tables (aws/invoke ddb {:op :ListTables})]
                (assert (some #(= "aif-c01-test" %) (:TableNames tables))
                        "DynamoDB table not found")
                (println "DynamoDB:" (count (:TableNames tables)) "table(s)"))
              (println "All LocalStack checks passed")))'
